    <script type="text/javascript">
    $(document).ready(function() {
        console.log("detail ready!");
        var id = getParameterByName('id')
        console.log("id:" + id);
        var item = null;
        for (var i = 0; i < data.items.length; i++) {

            if (data.items[i].id === id) {
                item = data.items[i];
                break;
            }
        }
        console.log(item);
        var template = $($(".item-template").html());
        template.find(".item-img").attr("src", "img/" + item.img[0]);
        template.find(".item-title").text(item.title);
        template.find(".item-price").text("NT " + item.price + "元");
        template.find(".item-url").attr("href", "detail.html?id=" + item.id);
        $(".row").append(template)

    });
    </script>
